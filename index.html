<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maria Reference Images</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 24px;
      background: #fffafc;
      color: #333;
    }
    h1 {
      color: #c26a8d;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border: 1px solid #f0d6df;
      border-radius: 16px;
      padding: 12px;
    }
    img {
      width: 100%;
      border-radius: 12px;
    }
    .name {
      margin-top: 8px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Maria Reference Images</h1>
  <p>Maria To Issho reference image set.</p>

  <div class="grid">
    <div class="card">
      <img src="Reference_Face_Main.png" alt="Maria front face reference">
      <div class="name">Reference_Face_Main</div>
    </div>

    <div class="card">
      <img src="Reference_Face_Left.png" alt="Maria left face reference">
      <div class="name">Reference_Face_Left</div>
    </div>

    <div class="card">
      <img src="Reference_Face_Right.png" alt="Maria right face reference">
      <div class="name">Reference_Face_Right</div>
    </div>

    <div class="card">
      <img src="Reference_Face_Back.png" alt="Maria back reference">
      <div class="name">Reference_Face_Back</div>
    </div>

    <div class="card">
      <img src="Reference_Pose_Sample_01.png" alt="Maria pose reference">
      <div class="name">Reference_Pose_Sample_01</div>
    </div>
  </div>
</body>
</html>
